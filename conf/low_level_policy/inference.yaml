defaults:
  - policy: act     # Reuse the ACT architecture settings for evaluation.
  - override hydra/job_logging: custom # Write logs both to stdout and to the Hydra run dir.
  - _self_

device: cuda
checkpoint_path: ??? # Required path to a saved checkpoint.
prediction_frequency_hz: 5.0
sleep_rate: 0.05

hydra:
  run:
    dir: outputs/low_level_policy/inference/${now:%Y-%m-%d}/${now:%H-%M-%S}
