_target_: srth_new.low_level_policy.models.act_model.ACTPolicy
# Hydra will instantiate this class directly.

lr: 1e-5
kl_weight: 10
weight_decay: 1e-4
camera_names: ["left", "left_wrist", "right_wrist"] # Expected image streams in each sample.
num_queries: 60                                     # Usually should match the dataset chunk size.
action_dim: 20                                   # Number of action dimensions predicted per timestep.
action_mode: hybrid_relative
norm_scheme: std
use_language: true                      # Whether the policy conditions on language text.
language_encoder: distilbert            # Text encoder used by the policy for command strings.

img_backbone_cfg:
  lr_backbone: 1e-5
  masks: false
  backbone_type: efficientnet_b3film
  position_encoding_cfg:
    hidden_dim: 512
    position_embedding_type: sine                   # sine or v2

transformer_cfg:
  hidden_dim: 512
  dropout: 0.1
  nheads: 8
  dim_feedforward: 3200
  enc_layers: 4
  dec_layers: 7
  pre_norm: false

encoder_cfg:
  hidden_dim: 512
  dropout: 0.1
  nheads: 8
  dim_feedforward: 3200
  enc_layers: 4
  pre_norm: false

data_aug_cfg:

  endoscope_img:
    resize_shape: [360, 480]
    spatial:
      crop_ratio: 0.95
    color_jitter: 
      brightness: 0.2
      contrast: 0.4
      saturation: 0.5
      hue: 0.08
    pixel_dropout:
      max_holes: 128
      min_holes: 1
      p: 0.8
    random_shift:
      max_shift_x_ratio: 0.2
      max_shift_y_ratio: 0.2 

  lw_img:
    resize_shape: [360, 480]
    spatial:
      crop_ratio: 0.95
    color_jitter: 
      brightness: 0.2
      contrast: 0.4
      saturation: 0.5
      hue: 0.08
    pixel_dropout:
      max_holes: 128
      min_holes: 1
      p: 0.8
    random_shift:
      max_shift_x_ratio: 0.2
      max_shift_y_ratio: 0.2

  rw_img:
    resize_shape: [360, 480]
    spatial:
      crop_ratio: 0.95
    color_jitter: 
      brightness: 0.2
      contrast: 0.4
      saturation: 0.5
      hue: 0.08
    pixel_dropout:
      max_holes: 128
      min_holes: 1
      p: 0.8
    random_shift:
      max_shift_x_ratio: 0.2
      max_shift_y_ratio: 0.2  

