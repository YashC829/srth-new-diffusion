defaults:
  - dataloader: example                 # Sample dataloader settings for low-level training.
  - policy: act                        # ACT policy architecture and optimizer defaults.
  - override hydra/job_logging: custom # Write logs both to stdout and to the Hydra run dir.
  - _self_

seed: 1          # Global random seed for NumPy / PyTorch / data shuffling.
device: cuda     # Falls back to CPU only if the training code is updated to do so explicitly.

train:
  num_train_steps: 20000
  num_warmup_steps: 200
  save_every: 50            # Save a checkpoint every N training steps.
  keep_every: 1000          # Prune checkpoints so only one representative checkpoint survives per bin.
  validate_every: 5         # Run the validation loop every N training steps.
  checkpoint_dir: ${hydra:runtime.output_dir}/checkpoints

wandb:
  project: surpass_debugging              # W&B project name.
  entity: gbyrd3-johns-hopkins-university # W&B team / user namespace.
  name: ll_policy_debug                   # Human-readable run name.

  # resume settings
  resume: false        # Set true to restore config state from a previous W&B run.
  id: null             # Required when resuming; optional otherwise.
  mode: online         # online OR offline OR disabled

hydra:
  run:
    # Each run gets its own timestamped directory with logs, configs, and checkpoints.
    dir: <repo_dir_root_path>/outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
